<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πρόσκληση για το Πάρτι Γενεθλίων του Δημήτρη!</title>

    <!-- Google Fonts for Vivid Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'nunito': ['Nunito', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'float-1': 'float 6s ease-in-out infinite',
                        'float-2': 'float 8s ease-in-out infinite reverse',
                        'float-3': 'float 7s ease-in-out infinite 1s',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #A78BFA, #F472B6, #FBBF24, #34D399);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .sunburst {
            background: repeating-conic-gradient(#FDE68A 0 15deg,
                    #FBBF24 15deg 30deg);
            border-radius: 50%;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            opacity: 0.8;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: inset -10px -10px 0 rgba(0, 0, 0, 0.07);
        }

        .balloon::before {
            content: "▲";
            font-size: 20px;
            color: inherit;
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .balloon-string {
            position: absolute;
            width: 2px;
            height: 60px;
            background: rgba(255, 255, 255, 0.4);
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* 3D Coin Flip Custom Classes */
        .flip-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-container.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            /* Safari support */
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-nunito p-4 relative">

    <!-- Background Music -->
    <audio id="bgMusic" src="Six_Seven_on_the_Stoop.mp3" autoplay loop></audio>

    <!-- Floating Background Balloons -->
    <div class="balloon animate-float-1 w-16 h-20 bg-pink-400 left-[10%] text-pink-400" style="top: 20%;">
        <div class="balloon-string"></div>
    </div>
    <div class="balloon animate-float-2 w-20 h-24 bg-blue-400 right-[15%] text-blue-400" style="top: 40%;">
        <div class="balloon-string"></div>
    </div>
    <div class="balloon animate-float-3 w-14 h-16 bg-green-400 left-[20%] text-green-400" style="top: 70%;">
        <div class="balloon-string"></div>
    </div>
    <div class="balloon animate-float-1 w-24 h-32 bg-yellow-400 right-[5%] text-yellow-400" style="top: 10%;">
        <div class="balloon-string"></div>
    </div>

    <!-- Main Invitation Card -->
    <div id="mainCard"
        class="glass-card z-10 rounded-[3rem] p-8 md:p-12 max-w-lg w-full text-center relative overflow-hidden transform transition hover:scale-[1.02] duration-300">



        <div class="absolute top-4 left-4 w-4 h-4 bg-pink-400 rounded-full animate-pulse"></div>
        <div class="absolute top-4 right-4 w-4 h-4 bg-blue-400 rounded-full animate-pulse"
            style="animation-delay: 0.5s;"></div>
        <div class="absolute bottom-4 left-4 w-4 h-4 bg-yellow-400 rounded-full animate-pulse"
            style="animation-delay: 1s;"></div>
        <div class="absolute bottom-4 right-4 w-4 h-4 bg-green-400 rounded-full animate-pulse"
            style="animation-delay: 1.5s;"></div>

        <!-- Bouncy Title -->
        <h1
            class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-500 to-red-500 mb-2 animate-bounce-slow drop-shadow-sm leading-tight pb-2">
            Ώρα για Πάρτι!
        </h1>
        <p class="text-2xl font-black text-blue-500 mb-6 tracking-wide">
            ΚΛΕΙΝΩ ΤΑ 10!
        </p>

        <!-- Central Image with Spinning Sunburst -->
        <div class="relative w-48 h-48 md:w-56 md:h-56 mx-auto mb-8">
            <!-- Spinning Background -->
            <div class="absolute inset-0 sunburst animate-spin-slow"></div>

            <!-- Interactive 3D Flip Wrapper -->
            <div class="absolute inset-3 w-[calc(100%-24px)] h-[calc(100%-24px)] flip-container z-10"
                onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner w-full h-full relative">
                    <!-- Front (Birthday Star) -->
                    <div
                        class="flip-card-front w-full h-full rounded-full border-4 border-white shadow-xl overflow-hidden bg-gray-200">
                        <img id="kidImage" src="20250719_213807.jpg" alt="Birthday Star!"
                            class="w-full h-full object-cover scale-125">
                    </div>
                    <!-- Back ("Bruh!!!") -->
                    <div
                        class="flip-card-back w-full h-full rounded-full border-4 border-white shadow-xl overflow-hidden flex items-center justify-center bg-gradient-to-tr from-yellow-400 via-orange-400 to-pink-500 text-white select-none">
                        <span style="font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;"
                            class="text-3xl md:text-4xl font-black tracking-wider drop-shadow-md transform -rotate-12 animate-bounce-slow">Bruh!!!</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Party Details -->
        <div
            class="space-y-5 text-lg md:text-xl font-black text-gray-700 bg-white/50 rounded-3xl p-6 border-2 border-dashed border-pink-300">

            <div
                class="flex items-center justify-start pl-6 md:pl-12 gap-3 transform hover:scale-110 transition duration-200">
                <div
                    class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center text-2xl shadow-sm flex-shrink-0">
                    📅</div>
                <span class="text-purple-700">26 / 07 / 2026</span>
            </div>

            <div
                class="flex items-center justify-start pl-6 md:pl-12 gap-3 transform hover:scale-110 transition duration-200">
                <div
                    class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-2xl shadow-sm flex-shrink-0">
                    ⏰</div>
                <span class="text-blue-700">19:30</span>
            </div>

            <div
                class="flex items-center justify-start pl-6 md:pl-12 gap-3 transform hover:scale-110 transition duration-200">
                <div
                    class="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center text-2xl shadow-sm flex-shrink-0">
                    📍</div>
                <span class="text-pink-600 text-left leading-tight">
                    Cake &amp; Roll, Πλατεία Βενιζέλου<br>
                    <span class="text-sm md:text-base text-gray-500">Κορυδαλλός</span>
                </span>
            </div>

        </div>

        <!-- Action Buttons Container -->
        <div class="mt-8 flex flex-row items-center justify-center gap-4">
            <!-- Fireworks Celebration Button -->
            <button onclick="triggerCelebration()"
                class="relative w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-orange-400 border-4 border-white flex items-center justify-center text-3xl shadow-lg hover:scale-110 hover:-translate-y-1 active:scale-95 transition-all duration-200 cursor-pointer"
                title="Πυροτεχνήματα!">
                🎆
            </button>

            <!-- Playful Music Toggle Button (rounded rectangle / wider) -->
            <button id="musicToggle" onclick="toggleMusic()"
                class="relative px-6 h-16 rounded-3xl bg-gradient-to-r from-pink-500 to-orange-400 border-4 border-white flex items-center justify-center gap-2 text-2xl font-black text-white shadow-lg hover:scale-110 hover:-translate-y-1 active:scale-95 transition-all duration-200 cursor-pointer"
                title="Μουσική">
                <span id="musicIcon">🎵</span>
                <span class="text-base md:text-lg tracking-wider select-none">ΜΟΥΣΙΚΗ</span>
            </button>

            <!-- Emoji Pop Button -->
            <button onclick="triggerEmojiPop()"
                class="relative w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-orange-400 border-4 border-white flex items-center justify-center text-3xl shadow-lg hover:scale-110 hover:-translate-y-1 active:scale-95 transition-all duration-200 cursor-pointer"
                title="Έκρηξη Emoji!">
                🥳
            </button>
        </div>

    </div>

    <!-- Interactivity Script -->
    <script>

        // Start with a small pop of confetti on load
        window.onload = function () {
            var audio = document.getElementById('bgMusic');
            var btn = document.getElementById('musicToggle');
            var icon = document.getElementById('musicIcon');
            if (audio) {
                audio.play().then(function () {
                    if (icon) icon.innerHTML = '🎵';
                    if (btn) btn.classList.add('animate-pulse');
                }).catch(function (error) {
                    console.log("Autoplay was prevented by the browser:", error);
                    if (icon) icon.innerHTML = '🔇';
                    if (btn) btn.classList.remove('animate-pulse');
                });
            }
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    spread: 60,
                    origin: { y: 0.8 },
                    colors: ['#F472B6', '#60A5FA', '#FBBF24', '#34D399']
                });
            }, 500);
        };

        // Grand celebration fireworks when button is clicked
        function triggerCelebration() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                // Burst of fireworks in mid-air
                confetti({
                    particleCount: 80,
                    startVelocity: 35,
                    spread: 360,
                    ticks: 80,
                    origin: {
                        x: randomInRange(0.15, 0.85),
                        y: randomInRange(0.15, 0.45)
                    },
                    colors: ['#FF1493', '#00FFFF', '#FFD700', '#FF4500', '#ADFF2F', '#9400D3', '#FF00FF']
                });
            }, 350);
        }

        // Toggle Music Play/Pause
        function toggleMusic() {
            var audio = document.getElementById('bgMusic');
            var btn = document.getElementById('musicToggle');
            var icon = document.getElementById('musicIcon');
            if (audio && btn) {
                if (audio.paused) {
                    audio.play().then(function () {
                        if (icon) icon.innerHTML = '🎵';
                        btn.classList.add('animate-pulse');
                    }).catch(function (error) {
                        console.log("Play failed:", error);
                    });
                } else {
                    audio.pause();
                    if (icon) icon.innerHTML = '🔇';
                    btn.classList.remove('animate-pulse');
                }
            }
        }

        // Random Emoji Pop
        function triggerEmojiPop() {
            var emojis = ['🎈', '🎂', '🥳', '🎉', '🎁', '🍬', '🍦', '🍩', '🌟', '🦄', '🦁', '🍕', '🥤', '🎨', '🎪'];
            var card = document.getElementById('mainCard');
            if (!card) return;

            var emojiEl = document.createElement('div');
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.position = 'absolute';

            var x = Math.random() * 80 + 10; // 10% to 90%
            var y = Math.random() * 80 + 10; // 10% to 90%
            emojiEl.style.left = x + '%';
            emojiEl.style.top = y + '%';
            emojiEl.style.fontSize = Math.floor(Math.random() * 24 + 36) + 'px'; // 36px to 60px
            emojiEl.style.userSelect = 'none';
            emojiEl.style.pointerEvents = 'none';
            emojiEl.style.zIndex = '30';
            emojiEl.style.transition = 'all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            emojiEl.style.opacity = '0';
            emojiEl.style.transform = 'scale(0.3) translateY(20px)';

            card.appendChild(emojiEl);

            // Trigger animation
            setTimeout(function () {
                emojiEl.style.opacity = '1';
                emojiEl.style.transform = 'scale(1.2) translateY(-40px)';
            }, 50);

            // Fade out and cleanup
            setTimeout(function () {
                emojiEl.style.opacity = '0';
                emojiEl.style.transform = 'scale(0.8) translateY(-80px)';
                setTimeout(function () {
                    emojiEl.remove();
                }, 500);
            }, 1000 + Math.random() * 500);
        }

        // Tap/Click to throw confetti at coordinate points
        document.addEventListener('click', function (event) {
            // Avoid triggering when clicking buttons, inputs, or the main clickable kid's image
            if (event.target.closest('button') || event.target.closest('input') || event.target.closest('img') || event.target.closest('a')) {
                return;
            }

            var x = event.clientX / window.innerWidth;
            var y = event.clientY / window.innerHeight;

            confetti({
                particleCount: 20,
                spread: 60,
                origin: { x: x, y: y },
                colors: ['#F472B6', '#60A5FA', '#FBBF24', '#34D399', '#A78BFA']
            });
        });
    </script>
</body>

</html>
